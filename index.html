<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <link rel="stylesheet" type="text/css" href="src/css/style.css" />
    <link rel="shortcut icon" href="src/img/smile.png" type="image/png" />
    <meta name="description" content="Input-Footer" />
    <meta name="author" content="Gnonik1" />
    <meta property="og:url" content="https://gnonik1.github.io/input-footer/" />
    <meta property="og:type" content="footer" />
    <meta property="og:title" content="Input-Footer" />
    <meta property="og:description" content="How make Input-Footer" />
    <meta
      property="og:image"
      content="https://raw.githubusercontent.com/Gnonik1/input-footer/refs/heads/main/src/img/smile.png"
    />
  </head>
  <body>
    <footer class="container">
      <div class="grid">
        <section class="contact">
          <h2>კონტაქტი</h2>
          <p class="text">
            Lorem Ipsum საბეჭდი და ტიპოგრაფიული ინდუსტრიის უშინაარსო ტექსტია.
            იგი სტანდარტად 1500-იანი წლებიდან იქცა, როდესაც უცნობმა მბეჭდავმა
            ამწყობ დაზგაზე წიგნის საცდელი ეგზემპლარი დაბეჭდა.
          </p>
          <img src="src/img/map.png" alt="map" class="map" />
          <div class="collect">
            <a href="tel:+995555444333" class="contact-link">
              <span class="icon">
                <img src="src/img/outside.png" alt="" class="icon-out" />
                <img src="src/img/phone.png" alt="" class="icon-img" />
              </span>
              +995 555 444 333
            </a>
            <a href="mailto:example@gmail.com" class="contact-link">
              <span class="icon">
                <img src="src/img/outside.png" alt="" class="icon-out" />
                <img src="src/img/email.png" alt="" class="icon-img" />
              </span>
              example@gmail.com
            </a>
          </div>
        </section>
        <section class="input">
          <form action="#">
            <label for="username"
              >სახელი, გვარი
              <input
                type="text"
                name="user_name"
                placeholder="შეიყვანეთ სახელი, გვარი"
                id="username"
              />
            </label>
            <label for="email"
              >ელ.ფოსტა
              <input
                type="email"
                name="email"
                id="email"
                placeholder="example@gmail.com"
              />
            </label>
            <label for="phone"
              >ტელეფონის ნომერი
              <input
                type="tel"
                name="phone"
                placeholder="+995 ... ......"
                id="phone"
              />
            </label>
            <label for="message"
              >შეტყობინება
              <textarea
                type="textarea"
                name="message"
                id="message"
                rows="5"
                cols="30"
                placeholder="შეიყვანეთ ტექსტი"
              ></textarea>
            </label>
            <button type="submit">გაგზავნა</button>
          </form>
        </section>
      </div>
      <p class="text1">
        დამზადებულია <img src="src/img/heart.png" alt="" />-ით
      </p>
    </footer>
  </body>
</html>
